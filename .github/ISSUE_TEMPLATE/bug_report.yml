name: Desktop bug report
description: Report a reproducible desktop app bug (one per issue).
title: "[Bug]: short summary here"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a desktop bug.

        If we can reproduce it, we can usually fix it. Please describe the bug in enough detail that someone else can understand what failed without watching a video or guessing from the title.
        Please replace the default title with a short summary of the actual problem.

        Vague reports such as "not working", "broken", or "same issue" may be labeled `needs-info` and closed if the missing details are not added.
        If the desktop app crashes or closes unexpectedly, logs are required. Crash reports without logs will be closed.

  - type: markdown
    attributes:
      value: |
        ## Quick checks

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this on the latest desktop release or latest main build.
          required: false
        - label: This issue is limited to a single bug (not multiple unrelated problems).
          required: true
        - label: This is not a source/stream-specific error (the issue happens regardless of which source is used).
          required: true

  - type: markdown
    attributes:
      value: |
        ## Version & desktop environment

  - type: input
    id: app_version
    attributes:
      label: App version / commit
      description: Desktop release version (e.g. 0.1.1-alpha) or commit hash. If unsure, say where you got the build from.
      placeholder: "e.g. 0.1.1-alpha, or main@abc1234"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - GitHub Release desktop installer/package
        - CI build / Nightly
        - Built from source
        - Other (please describe below)
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows (desktop)
        - macOS (desktop)
        - Linux (desktop)
        - Other (please describe below)
    validations:
      required: true

  - type: input
    id: desktop_hardware
    attributes:
      label: Desktop hardware
      description: "Example: Windows laptop model, custom PC CPU/GPU, MacBook Air M2, etc."
      placeholder: "e.g. Windows 11 laptop with Intel i5 / NVIDIA RTX 3060"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. Windows 11 24H2, macOS 15.2, Ubuntu 24.04"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## What happened?

  - type: dropdown
    id: area
    attributes:
      label: Area (tag)
      description: Pick the closest match. It helps triage.
      options:
        - Playback (start/stop/buffering)
        - Streams / Sources (selection, loading, errors)
        - Next Episode / Auto-play
        - Watch Progress (resume, watched state, history)
        - Subtitles (download, styling, sync)
        - Audio tracks
        - Windowing / Fullscreen
        - Keyboard / Mouse input
        - Navigation
        - UI / Layout
        - Settings
        - Sync (Trakt / remote)
        - Downloads / Offline
        - Installer / Updater
        - Platform-specific (Windows / macOS / Linux)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: |
        Explain the problem in detail. Do not only write "not working" or "same issue".
        Include what screen/flow you were using, what you clicked or tried to do, what changed on screen, and any visible error text.
      placeholder: |
        I was trying to ...
        The app ...
        I saw ...
        This happens on ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps, one action per line. If it depends on specific content, describe it (movie/series, season/episode, source/addon name) without sharing private links.
      placeholder: |
        1. Open ...
        2. Navigate to ...
        3. Click / type ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "What you expected to happen."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: "What actually happened? Include any on-screen error text/codes and whether the app froze, crashed, ignored input, showed the wrong content, etc."
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: Frequency
      options:
        - Always
        - Often (more than 50%)
        - Sometimes
        - Rarely
        - Once
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Did this work before?
      options:
        - Not sure
        - Yes, it used to work
        - No, it never worked
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Extra context (optional)

  - type: textarea
    id: media_details
    attributes:
      label: Media details (optional)
      description: Only include what you can safely share.
      placeholder: |
        - Content type: series/movie
        - Season/Episode: S1E2
        - Stream/source: (addon name / source label)
        - Video format: (if known)
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs (required for crash reports)
      description: |
        Required if the desktop app crashes or closes unexpectedly. Crash reports without logs will be closed.
        For other bug reports, logs are optional but still helpful.

        Useful logs include terminal/console output, installer logs, updater logs, or Windows Event Viewer crash details from around the time the issue occurred.
      render: shell
      placeholder: |
        Paste logs here
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else? (optional)
      description: Screenshots/recordings, related issues, workarounds, etc.
    validations:
      required: false
